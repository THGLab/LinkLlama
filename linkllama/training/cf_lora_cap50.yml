# Axolotl config: LinkLlama LoRA SFT on cap-50 balanced JSONL.
# Run from package `linkllama/training/` (from repo root: `linkllama/training/`) :
#   accelerate launch -m axolotl.cli.train cf_lora_cap50.yml
#
# Paths are relative to this file’s directory unless you pass absolute paths.

base_model: meta-llama/Llama-3.2-1B-Instruct
model_type: LlamaForCausalLM
tokenizer_type: AutoTokenizer
is_llama_derived_model: true

load_in_8bit: true
load_in_4bit: false
strict: false

datasets:
  - path: ../../data/chembl_processed/chembl36_balanced_cap50.jsonl
    ds_type: json
    type: alpaca
dataset_prepared_path: ./dataset_prepared_cap50/
val_set_size: 0.05
output_dir: ./outputs_cap50/

sequence_len: 2048
sample_packing: true
eval_sample_packing: true
pad_to_sequence_len: true

overrides_of_model_config:
  rope_scaling:
      rope_theta: 500000.0
      factor: 1.0
      low_freq_factor: 1.0
      high_freq_factor: 4.0
      original_max_position_embeddings: 8192
      rope_type: llama3

adapter: lora
lora_model_dir:
lora_r: 32
lora_alpha: 16
lora_dropout: 0.05
lora_target_linear: true
lora_fan_in_fan_out:

wandb_mode:
wandb_project: linkllama_sft
wandb_entity:
wandb_run_id:
wandb_watch:
wandb_log_model:
wandb_name: 1b-cap50-linkllama

gradient_accumulation_steps: 1
micro_batch_size: 1
num_epochs: 1
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 0.0002

train_on_inputs: false
group_by_length: false
bf16: auto
fp16:
tf32: false

gradient_checkpointing: true
early_stopping_patience:
resume_from_checkpoint:
local_rank:
logging_steps: 1
xformers_attention:
flash_attention: true
s2_attention:

warmup_steps: 10
evals_per_epoch: 4
eval_table_size:
eval_table_max_new_tokens: 128
saves_per_epoch: 5
debug:
deepspeed:
weight_decay: 0.0
fsdp:
fsdp_config:
special_tokens:
    pad_token: <|finetune_right_pad_id|>
